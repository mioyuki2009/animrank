name: Refresh data and deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
      PROJECT_HOMEPAGE: ${{ github.server_url }}/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test scoring and data rules
        run: npm test

      - name: Refresh ratings
        run: npm run refresh

      - name: Validate generated data
        run: npm run validate

      - name: Persist last-good data
        continue-on-error: true
        shell: bash
        run: |
          if git diff --quiet -- public/data; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): refresh ratings"
          git push

      - name: Build static site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
